name: Build StreamAll APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # bouton "Run workflow" dans l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: RÃ©cupÃ©rer le dÃ©pÃ´t (contient le zip)
        uses: actions/checkout@v4

      - name: DÃ©compresser le projet
        run: unzip -o StreamAll-android.zip      # -> crÃ©e le dossier StreamAll/

      - name: Installer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Plateforme & build-tools
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Installer Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK (debug)
        working-directory: StreamAll
        run: gradle assembleDebug --stacktrace

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamAll-debug
          path: StreamAll/app/build/outputs/apk/debug/app-debug.apk
